name: Review App

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  HEROKU_APP_NAME: jackmarchant-pr-${{ github.event.pull_request.number }}

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Deploy to Heroku Review App
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: npm install -g heroku

      - name: Create Heroku app if it does not exist
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku apps:info --app "$HEROKU_APP_NAME" 2>/dev/null \
            || heroku apps:create "$HEROKU_APP_NAME" --region us

      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git remote add heroku "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${HEROKU_APP_NAME}.git"
          git push heroku HEAD:main --force

      - name: Comment PR with review app URL
        uses: actions/github-script@v7
        with:
          script: |
            const appName = process.env.HEROKU_APP_NAME;
            const url = `https://${appName}.herokuapp.com`;
            const marker = '<!-- review-app-comment -->';
            const body = `${marker}\n🚀 Review app deployed: ${url}`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

  destroy:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Destroy Heroku Review App
    permissions: {}

    steps:
      - name: Install Heroku CLI
        run: npm install -g heroku

      - name: Destroy Heroku app
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku apps:destroy --app "$HEROKU_APP_NAME" --confirm "$HEROKU_APP_NAME"
